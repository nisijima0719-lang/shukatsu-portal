name: 終活ナビ コンテンツ自動更新

on:
  schedule:
    - cron: '0 0 * * 1'      # 毎週月曜 09:00 JST → ニュース更新
    - cron: '0 0 1 * *'      # 毎月1日 09:00 JST → コンテンツ月次更新
  workflow_dispatch:
    inputs:
      target:
        description: '実行対象'
        required: true
        default: 'news'
        type: choice
        options:
          - news
          - content
          - both

jobs:
  update-news:
    name: ニュース・豆知識の週次更新
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'news' || github.event.inputs.target == 'both')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic

      - name: ニュース・豆知識を更新
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_news.py

      - name: コミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 ニュース自動更新 $(date +'%Y-%m-%d')"
          git push

  update-content:
    name: トップページコンテンツの月次更新
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'content' || github.event.inputs.target == 'both')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic

      - name: コンテンツを月次更新
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_content.py

      - name: コミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "📅 コンテンツ月次更新 $(date +'%Y-%m')"
          git push
